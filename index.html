<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlesoup Game</title>
    <style>
        /* Import Google Sans (Product Sans) dari CDN eksternal agar berfungsi di GitHub */
        @import url('https://fonts.cdnfonts.com/css/product-sans');
        
        /* Setup Print untuk ukuran kertas A4 */
        @page {
            size: A4;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            /* Menggunakan Google Sans sebagai default seluruh teks */
            font-family: 'Product Sans', 'Google Sans', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #111;
            /* Ukuran presisi A4 */
            width: 210mm;
            min-height: 297mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 15mm 20mm;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            /* Menggunakan font Sekuya khusus untuk Judul utama */
            font-family: 'Sekuya', 'Impact', sans-serif; 
            font-size: 42px;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 15px 0 35px 0;
            text-align: center;
        }

        .board-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 45px;
        }

        .board-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Area Grid (Papan) */
        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid-with-row-labels {
            display: flex;
        }

        .row-labels {
            display: flex;
            flex-direction: column;
            width: 25px; /* Lebar fixed untuk align spacer */
            margin-right: 10px;
        }

        .row-labels div {
            height: 42px; /* Diperbesar */
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 15px;
            font-weight: 600;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(10, 42px);
            grid-template-rows: repeat(10, 42px);
            /* Warna Abu Tua Minimalis */
            border: 2px solid #666; 
        }

        .grid-cell {
            /* Garis dalam lebih tipis dan abu-abu terang */
            border: 1px solid #aaa; 
            background-color: transparent;
        }

        .col-labels {
            display: grid;
            grid-template-columns: repeat(10, 42px);
            margin-top: 5px;
        }

        .col-labels div {
            display: flex;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
        }

        /* Tombol Print (Sembunyi saat cetak) */
        .print-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #2c3e50;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.2s;
            z-index: 1000;
        }

        .print-btn:hover {
            background-color: #1a252f;
        }

        @media print {
            .print-btn {
                display: none !important;
            }
        }

    </style>
</head>
<body>

<!-- Tombol Print PDF -->
<button class="print-btn" onclick="window.print()">🖨️ Print to PDF</button>

<div class="container">
    <h1>BATTLESOUP</h1>

    <!-- Papan Lawan -->
    <div class="board-section">
        <div class="board-title">OPPONENT'S KITCHEN</div>
        <div class="board-container">
            <div class="grid-with-row-labels">
                <div class="row-labels" id="opp-row-labels"></div>
                <div class="main-grid" id="opp-grid"></div>
            </div>
            <div style="display:flex;">
                <!-- Spacer menutupi area row-labels (25px + margin 10px = 35px) -->
                <div style="width: 35px;"></div> 
                <div class="col-labels" id="opp-col-labels"></div>
            </div>
        </div>
    </div>

    <!-- Papan Saya -->
    <div class="board-section">
        <div class="board-title">MY KITCHEN</div>
        <div class="board-container">
            <div class="grid-with-row-labels">
                <div class="row-labels" id="my-row-labels"></div>
                <div class="main-grid" id="my-grid"></div>
            </div>
            <div style="display:flex;">
                <div style="width: 35px;"></div> <!-- Spacer -->
                <div class="col-labels" id="my-col-labels"></div>
            </div>
        </div>
    </div>

</div>

<script>
    const rows =['A','B','C','D','E','F','G','H','I','J'];
    
    function generateBoard(boardPrefix) {
        const grid = document.getElementById(boardPrefix + '-grid');
        const rowLabels = document.getElementById(boardPrefix + '-row-labels');
        const colLabels = document.getElementById(boardPrefix + '-col-labels');

        // Render Row Labels (A-J)
        rows.forEach(letter => {
            let div = document.createElement('div');
            div.innerText = letter;
            rowLabels.appendChild(div);
        });

        // Render Column Labels (1-10)
        for (let i = 1; i <= 10; i++) {
            let div = document.createElement('div');
            div.innerText = i;
            colLabels.appendChild(div);
        }

        // Render 100 Cells Papan
        for (let i = 0; i < 100; i++) {
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            grid.appendChild(cell);
        }
    }

    // Bangun Papan
    generateBoard('opp');
    generateBoard('my');
</script>

</body>
</html>
