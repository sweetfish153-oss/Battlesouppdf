<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlesoup Game</title>
    <style>
        /* Import Google Sans (Product Sans) dari CDN eksternal agar berfungsi di GitHub */
        @import url('https://fonts.cdnfonts.com/css/product-sans');
        
        /* 
         * PENTING UNTUK FONT SEKUYA:
         * Jika font Sekuya adalah file custom (.ttf / .woff), upload ke repo GitHub, 
         * lalu hapus tanda komentar (/* ... */) pada blok @font-face di bawah ini 
         * dan sesuaikan nama file-nya.
         */
        
        /*
        @font-face {
            font-family: 'Sekuya';
            src: url('sekuya.woff2') format('woff2'),
                 url('sekuya.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        */

        /* Setup Print untuk ukuran kertas A4 */
        @page {
            size: A4;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            /* Menggunakan Google Sans sebagai default seluruh teks */
            font-family: 'Product Sans', 'Google Sans', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #111;
            /* Ukuran presisi A4 */
            width: 210mm;
            min-height: 297mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 15mm 20mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        h1 {
            /* Menggunakan font Sekuya khusus untuk Judul utama */
            font-family: 'Sekuya', 'Impact', sans-serif; 
            font-size: 38px;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 10px 0 30px 0;
            text-align: center;
        }

        .board-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .board-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .board-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
        }

        /* Area Grid (Papan) */
        .board-container {
            display: flex;
            flex-direction: column;
        }

        .grid-with-row-labels {
            display: flex;
        }

        .row-labels {
            display: flex;
            flex-direction: column;
            margin-right: 10px;
        }

        .row-labels div {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 14px;
            font-weight: 600;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            grid-template-rows: repeat(10, 32px);
            border: 2px solid #000;
        }

        .grid-cell {
            border: 1px solid #000;
            background-color: transparent;
        }

        .col-labels {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            margin-left: 10px; /* offset dari row-labels */
            margin-top: 5px;
        }

        .col-labels div {
            display: flex;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        /* Area Legend (Tipe Bahan Soup) */
        .legend {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-top: 5px;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Membesarkan Emoji di dalam kotak */
        .s-box {
            width: 32px;
            height: 32px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px; /* Emoji dibesarkan penuhi kotak */
            line-height: 1;
        }

        .item-label {
            font-size: 13px;
            margin-top: 8px;
            font-weight: 600;
        }

        /* Bentuk-bentuk Shape Custom */
        .shape {
            display: grid;
            gap: 0;
        }
        .carrot-shape { grid-template-columns: repeat(5, 32px); }
        .peas-shape { grid-template-columns: repeat(3, 32px); }
        .chicken-shape { grid-template-columns: repeat(2, 32px); }
        
        .broccoli-shape {
            grid-template-columns: repeat(3, 32px);
            grid-template-rows: repeat(2, 32px);
        }
        .l-shrimp-shape {
            grid-template-columns: repeat(2, 32px);
            grid-template-rows: repeat(2, 32px);
        }

        /* Area Treaty di Kanan Chicken */
        .chicken-container {
            position: relative; /* Menjadi anchor untuk absolute positioning kotak treaty */
        }

        .treaty-box {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            margin-left: 45px; /* Jarak antara Chicken dan kotak Treaty */
            
            /* Desain Kotak Dashed */
            border: 2px dashed #000;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            border-radius: 4px;
        }

        .treaty-cutout {
            font-size: 18px;
            font-family: 'Sekuya', 'Impact', sans-serif;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .treaty-arrows {
            color: coral; /* Warna Coral */
            font-size: 38px; /* Panah Lebih Besar */
            font-weight: bold;
            letter-spacing: 10px;
            line-height: 1;
            margin-bottom: 5px;
        }

        .treaty-note {
            font-size: 12px;
            font-weight: 600;
        }

        /* Tombol Print (Sembunyi saat cetak) */
        .print-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #2c3e50;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.2s;
            z-index: 1000;
        }

        .print-btn:hover {
            background-color: #1a252f;
        }

        @media print {
            .print-btn {
                display: none !important;
            }
        }

    </style>
</head>
<body>

<!-- Tombol Print PDF -->
<button class="print-btn" onclick="window.print()">🖨️ Print to PDF</button>

<div class="container">
    <h1>BATTLESOUP</h1>

    <!-- Papan Lawan -->
    <div class="board-section">
        <div class="board-title">OPPONENT'S KITCHEN</div>
        <div class="board-layout">
            <div class="board-container">
                <div class="grid-with-row-labels">
                    <div class="row-labels" id="opp-row-labels"></div>
                    <div class="main-grid" id="opp-grid"></div>
                </div>
                <div style="display:flex;">
                    <div style="width:10px;"></div> <!-- Spacer -->
                    <div class="col-labels" id="opp-col-labels"></div>
                </div>
            </div>

            <!-- Panel Legend Bahan Makanan -->
            <div class="legend">
                <!-- Carrot -->
                <div class="legend-item">
                    <div class="shape carrot-shape">
                        <div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div>
                    </div>
                    <div class="item-label">Carrot</div>
                </div>
                <!-- Broccoli -->
                <div class="legend-item">
                    <div class="shape broccoli-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🥦</div>
                        <div class="s-box" style="grid-area: 1/2/2/3">🥦</div>
                        <div class="s-box" style="grid-area: 1/3/2/4">🥦</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🥦</div>
                    </div>
                    <div class="item-label">Broccoli</div>
                </div>
                <!-- Peas -->
                <div class="legend-item">
                    <div class="shape peas-shape">
                        <div class="s-box">🫛</div><div class="s-box">🫛</div><div class="s-box">🫛</div>
                    </div>
                    <div class="item-label">Peas</div>
                </div>
                <!-- Shrimp -->
                <div class="legend-item">
                    <div class="shape l-shrimp-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/1/3/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🍤</div>
                    </div>
                    <div class="item-label">Shrimp</div>
                </div>
                <!-- Chicken -->
                <div class="legend-item">
                    <div class="shape chicken-shape">
                        <div class="s-box">🍗</div><div class="s-box">🍗</div>
                    </div>
                    <div class="item-label">Chicken</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Papan Saya -->
    <div class="board-section">
        <div class="board-title">MY KITCHEN</div>
        <div class="board-layout">
            <div class="board-container">
                <div class="grid-with-row-labels">
                    <div class="row-labels" id="my-row-labels"></div>
                    <div class="main-grid" id="my-grid"></div>
                </div>
                <div style="display:flex;">
                    <div style="width:10px;"></div> <!-- Spacer -->
                    <div class="col-labels" id="my-col-labels"></div>
                </div>
            </div>

            <!-- Panel Legend Bahan Makanan -->
            <div class="legend">
                <!-- Carrot -->
                <div class="legend-item">
                    <div class="shape carrot-shape">
                        <div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div>
                    </div>
                    <div class="item-label">Carrot</div>
                </div>
                <!-- Broccoli -->
                <div class="legend-item">
                    <div class="shape broccoli-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🥦</div>
                        <div class="s-box" style="grid-area: 1/2/2/3">🥦</div>
                        <div class="s-box" style="grid-area: 1/3/2/4">🥦</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🥦</div>
                    </div>
                    <div class="item-label">Broccoli</div>
                </div>
                <!-- Peas -->
                <div class="legend-item">
                    <div class="shape peas-shape">
                        <div class="s-box">🫛</div><div class="s-box">🫛</div><div class="s-box">🫛</div>
                    </div>
                    <div class="item-label">Peas</div>
                </div>
                <!-- Shrimp -->
                <div class="legend-item">
                    <div class="shape l-shrimp-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/1/3/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🍤</div>
                    </div>
                    <div class="item-label">Shrimp</div>
                </div>
                
                <!-- Chicken + TREATY Box -->
                <div class="legend-item chicken-container">
                    <div class="shape chicken-shape">
                        <div class="s-box">🍗</div><div class="s-box">🍗</div>
                    </div>
                    <div class="item-label">Chicken</div>

                    <!-- Kotak Treaty di kanan Chicken (Bawah) -->
                    <div class="treaty-box">
                        <div class="treaty-cutout">TREATY</div>
                        <div class="treaty-arrows">&larr; &nbsp; &rarr;</div>
                        <div class="treaty-note">(Circle one)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const rows =['A','B','C','D','E','F','G','H','I','J'];
    
    function generateBoard(boardPrefix) {
        const grid = document.getElementById(boardPrefix + '-grid');
        const rowLabels = document.getElementById(boardPrefix + '-row-labels');
        const colLabels = document.getElementById(boardPrefix + '-col-labels');

        // Render Row Labels (A-J)
        rows.forEach(letter => {
            let div = document.createElement('div');
            div.innerText = letter;
            rowLabels.appendChild(div);
        });

        // Render Column Labels (1-10)
        for (let i = 1; i <= 10; i++) {
            let div = document.createElement('div');
            div.innerText = i;
            colLabels.appendChild(div);
        }

        // Render 100 Cells Papan
        for (let i = 0; i < 100; i++) {
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            grid.appendChild(cell);
        }
    }

    // Bangun Papan
    generateBoard('opp');
    generateBoard('my');
</script>

</body>
</html>
