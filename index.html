<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlesoup Game</title>
    <style>
        /* Mengatur font ke Google Sans (fallback ke font sans-serif lain jika tidak ada di lokal) */
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap');
        
        /* Setup Print untuk A4 */
        @page {
            size: A4;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Open Sans', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #111;
            /* Ukuran presisi A4 */
            width: 210mm;
            height: 297mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 15mm 20mm;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Sekuya', 'Impact', sans-serif; /* Sekuya dengan fallback bold font */
            font-size: 38px;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 10px 0 30px 0;
            text-align: center;
        }

        .board-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
        }

        .board-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .board-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
        }

        /* Area Grid (Papan) */
        .board-container {
            display: flex;
            flex-direction: column;
        }

        .grid-with-row-labels {
            display: flex;
        }

        .row-labels {
            display: flex;
            flex-direction: column;
            margin-right: 10px;
        }

        .row-labels div {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 14px;
            font-weight: 600;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            grid-template-rows: repeat(10, 32px);
            border: 2px solid #000;
        }

        .grid-cell {
            border: 1px solid #000;
            background-color: transparent;
        }

        .col-labels {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            margin-left: 10px; /* offset dari row-labels */
            margin-top: 5px;
        }

        .col-labels div {
            display: flex;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        /* Area Legend (Tipe Bahan Soup) */
        .legend {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-top: 5px;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Membesarkan Emoji di dalam kotak */
        .s-box {
            width: 32px;
            height: 32px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px; /* Emoji dibesarkan penuhi kotak */
            line-height: 1;
        }

        .item-label {
            font-size: 12px;
            margin-top: 6px;
            font-weight: 600;
        }

        .item-code {
            font-size: 11px;
            color: #555;
            border: 1px solid #ccc;
            padding: 1px 6px;
            margin-top: 2px;
            border-radius: 3px;
            letter-spacing: 1px;
        }

        /* Bentuk-bentuk Shape Custom */
        .shape {
            display: grid;
            gap: 0;
        }
        .carrot-shape { grid-template-columns: repeat(5, 32px); }
        .peas-shape { grid-template-columns: repeat(3, 32px); }
        .chicken-shape { grid-template-columns: repeat(2, 32px); }
        
        .broccoli-shape {
            grid-template-columns: repeat(3, 32px);
            grid-template-rows: repeat(2, 32px);
        }
        .l-shrimp-shape {
            grid-template-columns: repeat(2, 32px);
            grid-template-rows: repeat(2, 32px);
        }

    </style>
</head>
<body>

<div class="container">
    <h1>BATTLESOUP</h1>

    <!-- Papan Lawan -->
    <div class="board-section">
        <div class="board-title">OPPONENT'S BATTLESOUP</div>
        <div class="board-layout">
            <div class="board-container">
                <div class="grid-with-row-labels">
                    <div class="row-labels" id="opp-row-labels"></div>
                    <div class="main-grid" id="opp-grid"></div>
                </div>
                <div style="display:flex;">
                    <div style="width:10px;"></div> <!-- Spacer -->
                    <div class="col-labels" id="opp-col-labels"></div>
                </div>
            </div>

            <!-- Panel Legend/Kapal -->
            <div class="legend">
                <!-- Carrot -->
                <div class="legend-item">
                    <div class="shape carrot-shape">
                        <div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div>
                    </div>
                    <div class="item-label">Carrot</div>
                    <div class="item-code">CCCCC</div>
                </div>
                <!-- Broccoli -->
                <div class="legend-item">
                    <div class="shape broccoli-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🥦</div>
                        <div class="s-box" style="grid-area: 1/2/2/3">🥦</div>
                        <div class="s-box" style="grid-area: 1/3/2/4">🥦</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🥦</div>
                    </div>
                    <div class="item-label">Broccoli</div>
                    <div class="item-code">BBBB</div>
                </div>
                <!-- Peas -->
                <div class="legend-item">
                    <div class="shape peas-shape">
                        <div class="s-box">🫛</div><div class="s-box">🫛</div><div class="s-box">🫛</div>
                    </div>
                    <div class="item-label">Peas</div>
                    <div class="item-code">PPP</div>
                </div>
                <!-- Shrimp -->
                <div class="legend-item">
                    <div class="shape l-shrimp-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/1/3/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🍤</div>
                    </div>
                    <div class="item-label">Shrimp</div>
                    <div class="item-code">SSS</div>
                </div>
                <!-- Chicken -->
                <div class="legend-item">
                    <div class="shape chicken-shape">
                        <div class="s-box">🍗</div><div class="s-box">🍗</div>
                    </div>
                    <div class="item-label">Chicken</div>
                    <div class="item-code">CC</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Papan Saya -->
    <div class="board-section">
        <div class="board-title">MY BATTLESOUP</div>
        <div class="board-layout">
            <div class="board-container">
                <div class="grid-with-row-labels">
                    <div class="row-labels" id="my-row-labels"></div>
                    <div class="main-grid" id="my-grid"></div>
                </div>
                <div style="display:flex;">
                    <div style="width:10px;"></div> <!-- Spacer -->
                    <div class="col-labels" id="my-col-labels"></div>
                </div>
            </div>

            <!-- Panel Legend/Kapal (Duplikat) -->
            <div class="legend">
                <!-- Carrot -->
                <div class="legend-item">
                    <div class="shape carrot-shape">
                        <div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div><div class="s-box">🥕</div>
                    </div>
                    <div class="item-label">Carrot</div>
                    <div class="item-code">CCCCC</div>
                </div>
                <!-- Broccoli -->
                <div class="legend-item">
                    <div class="shape broccoli-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🥦</div>
                        <div class="s-box" style="grid-area: 1/2/2/3">🥦</div>
                        <div class="s-box" style="grid-area: 1/3/2/4">🥦</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🥦</div>
                    </div>
                    <div class="item-label">Broccoli</div>
                    <div class="item-code">BBBB</div>
                </div>
                <!-- Peas -->
                <div class="legend-item">
                    <div class="shape peas-shape">
                        <div class="s-box">🫛</div><div class="s-box">🫛</div><div class="s-box">🫛</div>
                    </div>
                    <div class="item-label">Peas</div>
                    <div class="item-code">PPP</div>
                </div>
                <!-- Shrimp -->
                <div class="legend-item">
                    <div class="shape l-shrimp-shape">
                        <div class="s-box" style="grid-area: 1/1/2/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/1/3/2">🍤</div>
                        <div class="s-box" style="grid-area: 2/2/3/3">🍤</div>
                    </div>
                    <div class="item-label">Shrimp</div>
                    <div class="item-code">SSS</div>
                </div>
                <!-- Chicken -->
                <div class="legend-item">
                    <div class="shape chicken-shape">
                        <div class="s-box">🍗</div><div class="s-box">🍗</div>
                    </div>
                    <div class="item-label">Chicken</div>
                    <div class="item-code">CC</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // JS Script untuk merender 10x10 Grid (mencegah penulisan HTML div manual 100x2 kali)
    const rows =['A','B','C','D','E','F','G','H','I','J'];
    
    function generateBoard(boardPrefix) {
        const grid = document.getElementById(boardPrefix + '-grid');
        const rowLabels = document.getElementById(boardPrefix + '-row-labels');
        const colLabels = document.getElementById(boardPrefix + '-col-labels');

        // Render Row Labels (A-J)
        rows.forEach(letter => {
            let div = document.createElement('div');
            div.innerText = letter;
            rowLabels.appendChild(div);
        });

        // Render Column Labels (1-10)
        for (let i = 1; i <= 10; i++) {
            let div = document.createElement('div');
            div.innerText = i;
            colLabels.appendChild(div);
        }

        // Render 100 Cells Papan
        for (let i = 0; i < 100; i++) {
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            grid.appendChild(cell);
        }
    }

    // Bangun Papan
    generateBoard('opp');
    generateBoard('my');
</script>

</body>
</html>
